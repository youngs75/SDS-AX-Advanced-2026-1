[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
check_untyped_defs = True
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-scripts.*]
disallow_untyped_defs = False
check_untyped_defs = False
