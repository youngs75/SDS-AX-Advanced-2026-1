# Day-08 LiteLLM proxy config.
# Derived from the official LiteLLM config examples:
# - https://raw.githubusercontent.com/BerriAI/litellm/main/dev_config.yaml
# - https://docs.litellm.ai/ (Proxy Server -> CREATE config.yaml)
#
# This config keeps the learner-facing contract stable:
# - students call the alias below
# - LiteLLM forwards to the instructor-provided vLLM OpenAI-compatible endpoint

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: gpt-5.4-mini
      api_key: "EMPTY"

general_settings:
  master_key: sds-class-123

litellm_settings:
  drop_params: true
  telemetry: false
